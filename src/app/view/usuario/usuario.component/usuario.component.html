<div class="container">
  <div class="header">
    <h2>👥 Usuarios</h2>
  </div>

  <p class="mensaje" *ngIf="mensaje">✅ {{ mensaje }}</p>
  <p class="error" *ngIf="error">❌ {{ error }}</p>

  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>Rol</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (u of usuarios; track u.id) {
        <tr>
          <td>{{ u.nombre }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.rol }}</td>
          <td>
            <button class="btn-delete" (click)="eliminar(u.id)">Eliminar</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
